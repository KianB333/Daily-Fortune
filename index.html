<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Daily Health Fortune</title>
        <script src="javascript.js" defer></script>
        <link rel="stylesheet" href="./style.css">
    </head>

    <body>
        <div class="controls">
            <button class="roll">Roll</button>
            <div class="dice">
                <div class="die">
                    <img src="./img/unknown-dice.png" alt="Unrolled Dice" class="die1">
                </div>
                <div class="die">
                    <img src="./img/unknown-dice.png" alt="Unrolled Dice" class="die2">
                </div>
                <div class="die">
                    <img src="./img/unknown-dice.png" alt="Unrolled Dice" class="die3">
                </div>
            </div>
            <button class="reroll">Reroll</button>
        </div>
        <div class="output">
            <div class="fortune"></div>
            <div class="health"></div>
        </div>
    </body>
